name: gp_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.0
  font_awesome_flutter: ^10.6.0
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.4.4

  http: ^1.6.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.2.4
  stomp_dart_client: ^2.0.0
  web_socket_channel: ^3.0.0
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^19.0.0
  connectivity_plus: ^7.1.1
  shimmer: ^3.0.0
  image_picker: ^1.2.1
  image_cropper: ^9.1.0
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5
  fl_chart: ^0.70.2
  syncfusion_flutter_charts: ^33.2.5
  flutter_background_service: ^5.0.12
  flutter_background_service_android: ^6.2.8
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "app-logo.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
