<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="NABDA logo">
  <title>NABDA — ECG heartbeat logo</title>
  <defs>
    <!-- Soft outer glow for the ECG stroke. -->
    <filter id="nabda-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <!-- Drop shadow under the circle, mirrors Flutter `0 10 20 primaryBlue × 20%`. -->
    <filter id="nabda-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.20"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- White circle backplate with a soft primary-blue shadow. -->
  <g filter="url(#nabda-shadow)">
    <circle cx="100" cy="100" r="100" fill="#FFFFFF"/>
  </g>

  <!-- Clip everything below to the circle. -->
  <clipPath id="nabda-clip">
    <circle cx="100" cy="100" r="100"/>
  </clipPath>

